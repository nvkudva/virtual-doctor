# P0.7 CI (ARCHITECTURE §12 Phase 0): typecheck + lint + unit + build + size budgets on every
# PR, through the Turbo cache. `bun install --frozen-lockfile` fails if bun.lock drifts.
# The `size` step enforces the DEC-19 per-module ≤150 KB gzip initial-JS budget; ESLint enforces
# the DEC-19 import boundary (modules/* may not import another modules/*).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint (incl. DEC-19 import boundary)
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Size budgets (DEC-19 ≤150 KB gzip/module)
        run: bun run size

  deploy:
    # Deploy the single PWA to Cloudflare Pages (DEC-12) on main only, after verify passes.
    # SPA history-fallback is served via apps/web/public/_redirects. Skipped unless the
    # Cloudflare secrets are configured, so forks and PRs never attempt a deploy.
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=virtual-doctor
