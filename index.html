<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Virtual Doctor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:radial-gradient(ellipse 120% 80% at 50% 0%,#E9EDF4 0%,#DCE1EB 100%);font-family:"Instrument Sans",system-ui,sans-serif;min-height:100vh}
*{box-sizing:border-box}
.vd-scroll::-webkit-scrollbar{width:0}
.vd-hov:hover{background:#F3F6FB}
@keyframes vd-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes vd-ring{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.55);opacity:0}}
@keyframes vd-bar{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
@keyframes vd-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes vd-spin-r{from{transform:rotate(360deg)}to{transform:rotate(0)}}
@keyframes vd-drift{0%,100%{transform:translate(-8%,-6%) scale(1)}50%{transform:translate(8%,6%) scale(1.15)}}
@keyframes vd-fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes vd-dot{0%,80%,100%{opacity:.25}40%{opacity:1}}
@keyframes vd-listen{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
@keyframes vd-think{0%,100%{transform:scale(.97) rotate(-1deg)}50%{transform:scale(1.01) rotate(1deg)}}
@keyframes vd-speak{0%,100%{transform:scale(1.02)}25%{transform:scale(1.06)}50%{transform:scale(1.0)}75%{transform:scale(1.07)}}
@keyframes vd-slidein{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="./js/main.js"></script>
</body>
</html>
